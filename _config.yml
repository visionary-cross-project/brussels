# =========================================================
# Brussels Cross — site settings
# =========================================================
# Part of the Visionary Cross Project. This repository holds the Brussels Cross
# site. Published as a project site under the hub's domain
# (visionary-cross-project.github.io/brussels), exactly like Ruthwell and
# Bewcastle.

title: Brussels Cross
email: humanitiesinnovationlab@gmail.com
description: >-
  A digital edition of the Brussels Cross, part of the Visionary Cross Project.

# baseurl: the subpath this project site is served from, so links using
# relative_url resolve under /brussels. The Pages workflow sets it at build.
baseurl: ""
# url: the base hostname & protocol for the published site.
url: "https://visionary-cross-project.github.io"

# remote_theme: pull the shared layouts, includes, and styles from the hub repo
# at build time, just like the other crosses.
remote_theme: visionary-cross-project/visionary-cross-project.github.io

# Per-cross links for the shared nav. All three crosses live on this domain, so
# these are root-relative paths.
crosses:
  ruthwell: "/ruthwell"
  bewcastle: "/bewcastle"
  brussels: "/brussels"

# Shared header (rendered by the theme's _includes/header.html). header_image is
# baseurl-relative, so it resolves to /brussels/assets/img/head.jpg.
header_title: "Brussels"
header_image: "/assets/img/head.jpg"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-remote-theme

# Sass: partials and assets/css/main.scss live in the remote theme.
sass:
  style: expanded

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
